name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest cryptography

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install TypeScript bridge dependencies
        working-directory: t3n-bridge
        run: npm ci

      - name: Build TypeScript bridge
        working-directory: t3n-bridge
        run: npm run build

      - name: Run TypeScript bridge integration test
        working-directory: t3n-bridge
        run: npm test

      - name: Run Python security tests
        run: python -m pytest tests/negative_security.py tests/test_result_verifier.py tests/test_audit_guards.py -v --tb=short

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Build Rust/WASM contract
        working-directory: contract
        run: |
          ADN_BUILD_COMMIT="${GITHUB_SHA}" \
          ADN_RUSTC_VERSION="$(rustc --version)" \
          cargo build --locked --target wasm32-wasip2 --release

      - name: Run Rust contract unit tests
        working-directory: contract
        run: cargo test --locked

      - name: Run Rust contract tests with pinned issuer
        working-directory: contract
        env:
          ADN_TRUSTED_ISSUER: 58da990a8f4a3a6ca7cb6315d68a140105917352
          ADN_TENANT_DID: did:t3n:fixture
        run: cargo test --locked

      - name: Build pinned Rust/WASM contract
        working-directory: contract
        env:
          ADN_TRUSTED_ISSUER: 58da990a8f4a3a6ca7cb6315d68a140105917352
          ADN_TENANT_DID: did:t3n:fixture
        run: |
          ADN_BUILD_COMMIT="${GITHUB_SHA}" \
          ADN_RUSTC_VERSION="$(rustc --version)" \
          cargo build --locked --target wasm32-wasip2 --release

      - name: Post commit status
        if: always()
        continue-on-error: true
        run: |
          STATE=$([ "${{ job.status }}" = "success" ] && echo "success" || echo "failure")
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state="$STATE" \
            -f context="Tests" \
            -f description="Python security, verifier, and audit-guard tests"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}



