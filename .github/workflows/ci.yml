name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: "python -m pip install --require-hashes -r requirements-ci.lock --only-binary=:all:"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install TypeScript bridge dependencies
        working-directory: t3n-bridge
        run: npm ci

      - name: Build TypeScript bridge
        working-directory: t3n-bridge
        run: npm run build

      - name: Run TypeScript bridge integration test
        working-directory: t3n-bridge
        run: npm test

      - name: Run release claim gate
        run: python scripts/release_gate.py

      - name: Check README claims
        run: python scripts/check_readme_claims.py

      - name: Run Python security tests
        run: python -m pytest tests/negative_security.py tests/test_result_verifier.py tests/test_audit_guards.py tests/test_release_verifier.py tests/test_release_remote_verifier.py tests/test_release_asset_verifier.py tests/test_release_asset_remote_verifier.py -v --tb=short

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: wasm32-wasip2

      - name: Build Rust/WASM contract
        working-directory: contract
        run: |
          ADN_BUILD_COMMIT="${GITHUB_SHA}" \
          ADN_RUSTC_VERSION="$(rustc --version)" \
          cargo build --locked --target wasm32-wasip2 --release

      - name: Run Rust contract unit tests
        working-directory: contract
        run: cargo test --locked

      - name: Run Rust contract tests with pinned issuer
        working-directory: contract
        env:
          ADN_TRUSTED_ISSUER: 58da990a8f4a3a6ca7cb6315d68a140105917352
          ADN_TENANT_DID: did:t3n:fixture
        run: cargo test --locked

      - name: Build pinned Rust/WASM contract
        working-directory: contract
        env:
          ADN_TRUSTED_ISSUER: 58da990a8f4a3a6ca7cb6315d68a140105917352
          ADN_TENANT_DID: did:t3n:fixture
        run: |
          ADN_BUILD_COMMIT="${GITHUB_SHA}" \
          ADN_RUSTC_VERSION="$(rustc --version)" \
          cargo build --locked --target wasm32-wasip2 --release

      - name: Post commit status
        if: always()
        continue-on-error: true
        run: |
          STATE=$([ "${{ job.status }}" = "success" ] && echo "success" || echo "failure")
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state="$STATE" \
            -f context="Tests" \
            -f description="Python security, verifier, and audit-guard tests"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}



