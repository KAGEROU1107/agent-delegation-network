name: Release Proof Attest

on:
  workflow_run:
    workflows: ["Release Proof Input"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  attest-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    environment: release-proof

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install verifier dependencies
        run: pip install cryptography

      - name: Generate final CI attestation from completed input workflow
        id: attest
        env:
          ADN_RELEASE_OPERATOR_PUBLIC_KEY_HEX: ${{ secrets.ADN_RELEASE_OPERATOR_PUBLIC_KEY_HEX }}
          ADN_RELEASE_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          INPUT_RUN_ID: ${{ github.event.workflow_run.id }}
          INPUT_RUN_URL: ${{ github.event.workflow_run.html_url }}
          PROOF_DIR: ${{ runner.temp }}/release-proof
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          from scripts.verify_release import PROOF_INPUT_FILES, digest_hex, verify_release_inputs
          from scripts.verify_release_remote import (
              GitHubActionsClient,
              materialize_proof_inputs_from_artifact_zip,
              normalize_digest,
          )

          repository = os.environ["GITHUB_REPOSITORY"]
          input_sha = os.environ["INPUT_HEAD_SHA"]
          input_run_id = os.environ["INPUT_RUN_ID"]
          artifact_name = f"adn-release-proof-input-{input_sha}"
          proof_dir = Path(os.environ["PROOF_DIR"])

          client = GitHubActionsClient(token=os.environ["GITHUB_TOKEN"])
          artifacts = client.list_workflow_run_artifacts(repository, input_run_id)

          matches = [artifact for artifact in artifacts if artifact.get("name") == artifact_name]
          if len(matches) != 1:
              raise RuntimeError(f"expected exactly one proof input artifact named {artifact_name}, got {len(matches)}")
          artifact = matches[0]
          if artifact.get("expired") is True:
              raise RuntimeError(f"proof input artifact {artifact_name} has expired")

          artifact_id = str(artifact["id"])
          artifact_zip = client.download_artifact_zip(artifact)
          artifact_digest = normalize_digest(artifact.get("digest"))
          downloaded_digest = digest_hex(artifact_zip)
          if downloaded_digest != artifact_digest:
              raise RuntimeError("downloaded proof input artifact digest does not match GitHub metadata")

          materialized = materialize_proof_inputs_from_artifact_zip(proof_dir, artifact_zip)
          result = verify_release_inputs(proof_dir)
          if result["proof_input_digest"] != materialized["proof_input_digest"]:
              raise RuntimeError("materialized proof input digest mismatch")

          payload = {
              "evidence_source": "github_actions",
              "generated_by": ".github/workflows/release-proof-attest.yml",
              "attested_workflow": ".github/workflows/release-proof-input.yml",
              "attestation_phase": "post_verify_completed_run",
              "repository": repository,
              "sha": input_sha,
              "workflow_run_id": input_run_id,
              "workflow_run_url": os.environ["INPUT_RUN_URL"],
              "workflow_conclusion": os.environ["INPUT_RUN_CONCLUSION"],
              "artifact_id": artifact_id,
              "artifact_name": artifact_name,
              "artifact_url": f"https://github.com/{repository}/actions/runs/{input_run_id}/artifacts/{artifact_id}",
              "artifact_digest": artifact_digest,
              "proof_input_digest": result["proof_input_digest"],
              "proof_input_files": PROOF_INPUT_FILES,
              "retrieved_at": datetime.now(timezone.utc).isoformat(),
          }
          (proof_dir / "ci_release_sha.json").write_text(
              json.dumps(payload, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"proof_dir={proof_dir}\n")
          PY

      - name: Verify release proof bundle with completed-run CI attestation
        env:
          ADN_RELEASE_OPERATOR_PUBLIC_KEY_HEX: ${{ secrets.ADN_RELEASE_OPERATOR_PUBLIC_KEY_HEX }}
          ADN_RELEASE_REPOSITORY: ${{ github.repository }}
        run: python scripts/verify_release.py "${{ steps.attest.outputs.proof_dir }}"

      - name: Remote-verify GitHub proof input artifact
        env:
          ADN_RELEASE_OPERATOR_PUBLIC_KEY_HEX: ${{ secrets.ADN_RELEASE_OPERATOR_PUBLIC_KEY_HEX }}
          ADN_RELEASE_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/verify_release_remote.py "${{ steps.attest.outputs.proof_dir }}" --github-token "$GITHUB_TOKEN" --repository "$GITHUB_REPOSITORY"

      - name: Upload CI attestation
        uses: actions/upload-artifact@v4
        with:
          name: adn-release-ci-attestation-${{ github.event.workflow_run.head_sha }}
          path: ${{ steps.attest.outputs.proof_dir }}/ci_release_sha.json
          if-no-files-found: error
