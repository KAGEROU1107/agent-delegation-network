name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest cryptography

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install TypeScript bridge dependencies
        working-directory: t3n-bridge
        run: npm ci

      - name: Build TypeScript bridge
        working-directory: t3n-bridge
        run: npm run build

      - name: Run Python security tests
        run: python -m pytest tests/negative_security.py tests/test_result_verifier.py -v --tb=short

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Build Rust/WASM contract
        working-directory: contract
        run: cargo build --locked --target wasm32-wasip2 --release

      - name: Run Rust contract unit tests
        working-directory: contract
        run: cargo test --locked

      - name: Post commit status
        if: always()
        continue-on-error: true
        run: |
          STATE=$([ "${{ job.status }}" = "success" ] && echo "success" || echo "failure")
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state="$STATE" \
            -f context="Tests" \
            -f description="pytest 45 Python signing, policy, and result-verifier tests"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}



