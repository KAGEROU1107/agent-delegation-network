name: Release Proof Attest

on:
  workflow_run:
    workflows: ["Release Proof Input"]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  attest-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    environment: release-proof

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install verifier dependencies
        run: "python -m pip install --require-hashes -r requirements-release.lock --only-binary=:all:"

      - name: Generate final CI attestation from completed input workflow
        id: attest
        env:
          ADN_RELEASE_OPERATOR_PUBLIC_KEY_HEX: ${{ secrets.ADN_RELEASE_OPERATOR_PUBLIC_KEY_HEX }}
          ADN_RELEASE_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          INPUT_RUN_ID: ${{ github.event.workflow_run.id }}
          INPUT_RUN_URL: ${{ github.event.workflow_run.html_url }}
          PROOF_DIR: ${{ runner.temp }}/release-proof
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          from scripts.verify_release import PROOF_INPUT_FILES, digest_hex, verify_release_inputs
          from scripts.verify_release_remote import (
              GitHubActionsClient,
              find_successful_tests_workflow_run,
              materialize_proof_inputs_from_artifact_zip,
              normalize_digest,
          )

          repository = os.environ["GITHUB_REPOSITORY"]
          input_sha = os.environ["INPUT_HEAD_SHA"]
          input_run_id = os.environ["INPUT_RUN_ID"]
          artifact_name = f"adn-release-proof-input-{input_sha}"
          proof_dir = Path(os.environ["PROOF_DIR"])

          client = GitHubActionsClient(token=os.environ["GITHUB_TOKEN"])
          artifacts = client.list_workflow_run_artifacts(repository, input_run_id)

          matches = [artifact for artifact in artifacts if artifact.get("name") == artifact_name]
          if len(matches) != 1:
              raise RuntimeError(f"expected exactly one proof input artifact named {artifact_name}, got {len(matches)}")
          artifact = matches[0]
          if artifact.get("expired") is True:
              raise RuntimeError(f"proof input artifact {artifact_name} has expired")

          artifact_id = str(artifact["id"])
          artifact_zip = client.download_artifact_zip(artifact)
          artifact_digest = normalize_digest(artifact.get("digest"))
          downloaded_digest = digest_hex(artifact_zip)
          if downloaded_digest != artifact_digest:
              raise RuntimeError("downloaded proof input artifact digest does not match GitHub metadata")

          materialized = materialize_proof_inputs_from_artifact_zip(proof_dir, artifact_zip)
          result = verify_release_inputs(proof_dir)
          if result["proof_input_digest"] != materialized["proof_input_digest"]:
              raise RuntimeError("materialized proof input digest mismatch")

          tests_runs = client.list_workflow_runs_for_head(repository, input_sha)
          tests_run = find_successful_tests_workflow_run(
              tests_runs,
              repository=repository,
              head_sha=input_sha,
          )

          payload = {
              "evidence_source": "github_actions",
              "generated_by": ".github/workflows/release-proof-attest.yml",
              "attested_workflow": ".github/workflows/release-proof-input.yml",
              "attestation_phase": "post_verify_completed_run",
              "repository": repository,
              "sha": input_sha,
              "workflow_run_id": input_run_id,
              "workflow_run_url": os.environ["INPUT_RUN_URL"],
              "workflow_conclusion": os.environ["INPUT_RUN_CONCLUSION"],
              "tests_workflow_run_id": str(tests_run["id"]),
              "tests_workflow_run_url": tests_run["html_url"],
              "tests_workflow_conclusion": tests_run["conclusion"],
              "tests_workflow_head_sha": tests_run["head_sha"],
              "tests_workflow_event": tests_run["event"],
              "tests_workflow_head_branch": tests_run["head_branch"],
              "artifact_id": artifact_id,
              "artifact_name": artifact_name,
              "artifact_url": f"https://github.com/{repository}/actions/runs/{input_run_id}/artifacts/{artifact_id}",
              "artifact_digest": artifact_digest,
              "proof_input_digest": result["proof_input_digest"],
              "proof_input_files": PROOF_INPUT_FILES,
              "retrieved_at": datetime.now(timezone.utc).isoformat(),
          }
          (proof_dir / "ci_release_sha.json").write_text(
              json.dumps(payload, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"proof_dir={proof_dir}\n")
          PY

      - name: Verify release proof bundle with completed-run CI attestation
        env:
          ADN_RELEASE_OPERATOR_PUBLIC_KEY_HEX: ${{ secrets.ADN_RELEASE_OPERATOR_PUBLIC_KEY_HEX }}
          ADN_RELEASE_REPOSITORY: ${{ github.repository }}
        run: python scripts/verify_release.py "${{ steps.attest.outputs.proof_dir }}"

      - name: Remote-verify GitHub proof input artifact
        env:
          ADN_RELEASE_OPERATOR_PUBLIC_KEY_HEX: ${{ secrets.ADN_RELEASE_OPERATOR_PUBLIC_KEY_HEX }}
          ADN_RELEASE_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          python scripts/verify_release_remote.py "${{ steps.attest.outputs.proof_dir }}" --github-token "$GITHUB_TOKEN" --repository "$GITHUB_REPOSITORY" | tee "$RUNNER_TEMP/remote_verification_result.json"

      - name: Create durable release proof assets
        env:
          INPUT_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_RUN_ID: ${{ github.event.workflow_run.id }}
          INPUT_RUN_URL: ${{ github.event.workflow_run.html_url }}
          PROOF_DIR: ${{ steps.attest.outputs.proof_dir }}
          RELEASE_ASSET_DIR: ${{ runner.temp }}/release-proof-assets
          REMOTE_VERIFICATION_RESULT: ${{ runner.temp }}/remote_verification_result.json
        run: |
          mkdir -p "$RELEASE_ASSET_DIR"
          tar --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -cf "$RELEASE_ASSET_DIR/proof-input.tar" \
            -C "$PROOF_DIR" \
            deployment_manifest.json \
            deployment_manifest.sig \
            registration_response.json \
            invocation_receipt.json \
            t3n_evidence.json \
            replay_restart_proof.json
          cp "$PROOF_DIR/ci_release_sha.json" "$RELEASE_ASSET_DIR/ci_release_sha.json"
          cp "$REMOTE_VERIFICATION_RESULT" "$RELEASE_ASSET_DIR/remote_verification_result.json"
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          from scripts.verify_release import digest_hex

          asset_dir = Path(os.environ["RELEASE_ASSET_DIR"])
          ci_attestation = json.loads((asset_dir / "ci_release_sha.json").read_text(encoding="utf-8"))
          remote_result = json.loads((asset_dir / "remote_verification_result.json").read_text(encoding="utf-8"))
          payload = {
              "evidence_source": "github_actions_release_asset",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "sha": os.environ["INPUT_HEAD_SHA"],
              "attest_workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "attest_workflow_run_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "attest_workflow_run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "input_workflow_run_id": os.environ["INPUT_RUN_ID"],
              "input_workflow_run_url": os.environ["INPUT_RUN_URL"],
              "tests_workflow_run_id": ci_attestation["tests_workflow_run_id"],
              "tests_workflow_run_url": ci_attestation["tests_workflow_run_url"],
              "proof_input_digest": ci_attestation["proof_input_digest"],
              "remote_verification_status": remote_result["status"],
              "durable_asset_files": [
                  "proof-input.tar",
                  "ci_release_sha.json",
                  "remote_verification_result.json",
                  "workflow_metadata.json",
              ],
              "proof_input_archive_sha256": digest_hex((asset_dir / "proof-input.tar").read_bytes()),
              "ci_attestation_sha256": digest_hex((asset_dir / "ci_release_sha.json").read_bytes()),
              "remote_verification_result_sha256": digest_hex((asset_dir / "remote_verification_result.json").read_bytes()),
              "created_at": datetime.now(timezone.utc).isoformat(),
          }
          (asset_dir / "workflow_metadata.json").write_text(
              json.dumps(payload, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY
          tar --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -cf "$RUNNER_TEMP/adn-release-proof-${INPUT_HEAD_SHA}.tar" \
            -C "$RELEASE_ASSET_DIR" \
            ci_release_sha.json \
            proof-input.tar \
            remote_verification_result.json \
            workflow_metadata.json

      - name: Publish durable release proof assets
        env:
          ADN_RELEASE_ASSET_TAG: adn-release-proof-${{ github.event.workflow_run.head_sha }}
          ADN_RELEASE_ASSET_TITLE: ADN release proof ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ github.token }}
          INPUT_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RELEASE_ASSET_DIR: ${{ runner.temp }}/release-proof-assets
        run: |
          set -euo pipefail
          notes_file="$RUNNER_TEMP/adn-release-proof-notes.md"
          cat > "$notes_file" <<EOF
          Verified ADN release proof bundle for ${INPUT_HEAD_SHA}.

          The release assets include the proof-input archive, final CI attestation,
          remote verifier output, and workflow metadata. The project remains
          source-hardened / live-proof pending unless a pinned live deployment proof
          is present in the bundle.
          EOF
          if gh release view "$ADN_RELEASE_ASSET_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "refusing to overwrite durable proof assets: $ADN_RELEASE_ASSET_TAG" >&2
            exit 1
          fi
          gh release create "$ADN_RELEASE_ASSET_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$INPUT_HEAD_SHA" \
            --title "$ADN_RELEASE_ASSET_TITLE" \
            --notes-file "$notes_file" \
            --latest=false
          gh release upload "$ADN_RELEASE_ASSET_TAG" \
            "$RELEASE_ASSET_DIR/proof-input.tar" \
            "$RELEASE_ASSET_DIR/ci_release_sha.json" \
            "$RELEASE_ASSET_DIR/remote_verification_result.json" \
            "$RELEASE_ASSET_DIR/workflow_metadata.json" \
            "$RUNNER_TEMP/adn-release-proof-${INPUT_HEAD_SHA}.tar" \
            --repo "$GITHUB_REPOSITORY"

      - name: Upload CI attestation
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: adn-release-ci-attestation-${{ github.event.workflow_run.head_sha }}
          path: ${{ steps.attest.outputs.proof_dir }}/ci_release_sha.json
          if-no-files-found: error
          retention-days: 90
