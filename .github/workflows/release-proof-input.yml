name: Release Proof Input

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  verify-input:
    runs-on: ubuntu-latest
    environment: release-proof

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install verifier dependencies
        run: "python -m pip install --require-hashes -r requirements-release.lock --only-binary=:all:"

      - name: Define proof input artifact names
        id: artifact-name
        run: |
          echo "artifact_name=adn-release-proof-input-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "metadata_name=adn-release-proof-input-metadata-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Check retained release proof inputs
        run: |
          test -f proof/release/deployment_manifest.json
          test -f proof/release/deployment_manifest.sig
          test -f proof/release/registration_response.json
          test -f proof/release/invocation_receipt.json
          test -f proof/release/t3n_evidence.json
          test -f proof/release/replay_restart_proof.json

      - name: Verify retained proof inputs
        id: verify-input
        env:
          ADN_RELEASE_OPERATOR_PUBLIC_KEY_HEX: ${{ secrets.ADN_RELEASE_OPERATOR_PUBLIC_KEY_HEX }}
          ADN_RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/verify_release.py proof/release --input-only | tee "$RUNNER_TEMP/proof-input-result.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          result = json.loads(Path(os.environ["RUNNER_TEMP"], "proof-input-result.json").read_text(encoding="utf-8"))
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"proof_input_digest={result['proof_input_digest']}\n")
          PY

      - name: Create deterministic proof input archive
        run: |
          tar --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -cf "$RUNNER_TEMP/proof-input.tar" \
            proof/release/deployment_manifest.json \
            proof/release/deployment_manifest.sig \
            proof/release/registration_response.json \
            proof/release/invocation_receipt.json \
            proof/release/t3n_evidence.json \
            proof/release/replay_restart_proof.json

      - name: Upload verified proof input archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.artifact-name.outputs.artifact_name }}
          path: ${{ runner.temp }}/proof-input.tar
          if-no-files-found: error
          compression-level: 0

      - name: Write preliminary proof input metadata
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          from scripts.verify_release import PROOF_INPUT_FILES

          payload = {
              "evidence_source": "github_actions",
              "generated_by": ".github/workflows/release-proof-input.yml",
              "phase": "input_verified",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "sha": os.environ["GITHUB_SHA"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_run_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "artifact_name": os.environ["ARTIFACT_NAME"],
              "proof_input_digest": os.environ["PROOF_INPUT_DIGEST"],
              "proof_input_files": PROOF_INPUT_FILES,
              "retrieved_at": datetime.now(timezone.utc).isoformat(),
          }
          Path(os.environ["RUNNER_TEMP"], "proof-input-metadata.json").write_text(
              json.dumps(payload, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY
        env:
          ARTIFACT_NAME: ${{ steps.artifact-name.outputs.artifact_name }}
          PROOF_INPUT_DIGEST: ${{ steps.verify-input.outputs.proof_input_digest }}

      - name: Upload preliminary proof input metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.artifact-name.outputs.metadata_name }}
          path: ${{ runner.temp }}/proof-input-metadata.json
          if-no-files-found: error
